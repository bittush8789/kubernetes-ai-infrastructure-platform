apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: team-isolation-policy
  namespace: team-a
spec:
  podSelector: {} # Selects all pods in this namespace
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from within the same namespace
    - from:
        - podSelector: {}
    # Allow traffic from ingress-nginx controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
    # Allow traffic from ML Platform API namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: ml-platform
    # Allow Prometheus monitoring metrics collection
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9080 # KServe metrics
---
