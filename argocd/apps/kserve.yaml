apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/enterprise/kubernetes-ai-infrastructure-platform.git'
    targetRevision: HEAD
    path: kserve
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kserve
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
