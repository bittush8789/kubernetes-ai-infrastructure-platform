apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  namespace: ml-platform
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
        - name: wait-for-minio
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z minio-service 9000; do echo waiting for minio; sleep 2; done;']
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.10.2
          command:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - 5000
            - --backend-store-uri
            - postgresql://mlflow_user:mlflow_pass@postgres-service:5432/mlflow_db
            - --default-artifact-root
            - s3://mlflow-bucket/
            - --serve-artifacts
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: secretkey
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio-service:9000
            - name: MLFLOW_S3_IGNORE_TLS
              value: "true"
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: ml-platform
type: Opaque
stringData:
  accesskey: "minioadmin"
  secretkey: "minioadmin"
